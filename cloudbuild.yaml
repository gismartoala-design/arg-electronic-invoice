# Cloud Build configuration para despliegue en Cloud Run
steps:
  # Paso 1: Construir la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:latest'
      - '.'

  # Paso 2: Push a Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:$COMMIT_SHA'

  # Paso 3: Push tag latest
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:latest'

  # Paso 4: Desplegar a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arg-electronic-invoice'
      - '--image=gcr.io/$PROJECT_ID/arg-electronic-invoice:$COMMIT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=facturas-storage-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=NODE_ENV=production,STORAGE_PROVIDER=gcs,GCS_BUCKET=arg-facturas-prod'
      - '--set-secrets=DB_PASSWORD=db-password:latest,SIGNATURE_PASSWORD=signature-password:latest,JWT_SECRET=jwt-secret:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'

# Imágenes a guardar en Container Registry
images:
  - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/arg-electronic-invoice:latest'

# Opciones
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout del build (10 minutos)
timeout: 600s
